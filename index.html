<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMT Link-Profile</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="profile-container">
      <img
        src="https://avatars.githubusercontent.com/u/162150380?v=4"
        alt="Profile Picture"
        class="profile-img"
      />

      <h1 class="profile-name">LUY SOKMATRA</h1>
      <p class="profile-bio">Full-Stack Developer | IoT Engineer</p>

      <div class="links-container">
        <a
          href="https://facebook.com/luysokmatra"
          target="_blank"
          class="link-btn fb"
        >
          <i class="fab fa-facebook"></i> Facebook
        </a>
        <a
          href="https://www.youtube.com/@SMT-DEV?sub_confirmation=1"
          target="_blank"
          class="link-btn yt"
        >
          <i class="fab fa-youtube"></i> YouTube
        </a>
        <a
          href="https://github.com/smt-dev123"
          target="_blank"
          class="link-btn github"
        >
          <i class="fab fa-github"></i> GitHub
        </a>
        <a
          href="https://t.me/luysokmatra"
          target="_blank"
          class="link-btn telegram"
        >
          <i class="fab fa-telegram"></i> Telegram
        </a>
      </div>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
